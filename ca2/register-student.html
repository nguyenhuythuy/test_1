<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký Sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { border-radius: 12px; border: none; }
        .btn-primary { background-color: #5a57d6; border: none; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-white pt-4 border-0">
                        <h3 class="text-center fw-bold" id="formTitle">Đăng ký Sinh viên</h3>
                    </div>
                    <div class="card-body p-4">
                        <form id="studentForm" class="row g-3" novalidate>
                            <input type="hidden" id="editId">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Họ và tên</label>
                                <input type="text" class="form-control" id="fullName" placeholder="Nguyễn Văn A">
                                <div class="invalid-feedback">Họ tên phải từ 2-50 ký tự.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Mã sinh viên</label>
                                <input type="text" class="form-control" id="studentId" placeholder="SV001">
                                <div class="invalid-feedback">Định dạng SV + số (Ví dụ: SV001).</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="name@example.com">
                                <div class="invalid-feedback">Email không hợp lệ.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Số điện thoại</label>
                                <input type="tel" class="form-control" id="phone" placeholder="090...">
                                <div class="invalid-feedback">SĐT VN phải có 10 số.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Ngành học</label>
                                <select class="form-select" id="major">
                                    <option value="">-- Chọn ngành --</option>
                                    <option value="Công nghệ thông tin">Công nghệ thông tin</option>
                                    <option value="Quản trị kinh doanh">Quản trị kinh doanh</option>
                                    <option value="Thiết kế đồ họa">Thiết kế đồ họa</option>
                                </select>
                                <div class="invalid-feedback">Vui lòng chọn ngành.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold d-block">Giới tính</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="Nam" id="male" checked>
                                    <label class="form-check-label" for="male">Nam</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" value="Nữ" id="female">
                                    <label class="form-check-label" for="female">Nữ</label>
                                </div>
                            </div>
                            <div class="col-12 mt-5 d-flex gap-2">
                                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Lưu Thông Tin</button>
                                <a href="students.html" class="btn btn-light w-100 py-2 fw-bold border">Xem danh sách</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
