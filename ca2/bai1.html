<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sinh viên - Bootstrap 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .hidden { display: none; }
        .card { border-radius: 12px; border: none; }
        .btn-primary { background-color: #5a57d6; border: none; }
        .btn-primary:hover { background-color: #4845b5; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div id="listView">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Student Management</h2>
                <button class="btn btn-primary shadow-sm" onclick="showForm()">
                    <i class="bi bi-plus-lg"></i> Add Student
                </button>
            </div>

            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Họ tên</th>
                                <th>Mã SV</th>
                                <th>Email</th>
                                <th>Số điện thoại</th>
                                <th>Ngành</th>
                                <th>Giới tính</th>
                                <th class="text-end">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            </tbody>
                    </table>
                </div>

                <div id="emptyMessage" class="text-center py-5 hidden">
                    <i class="bi bi-people text-muted" style="font-size: 3rem;"></i>
                    <p class="mt-2 text-muted">Chưa có sinh viên nào trong danh sách.</p>
                </div>
            </div>
        </div>

        <div id="formView" class="hidden">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow">
                        <div class="card-header bg-white pt-4 border-0">
                            <h3 class="text-center fw-bold" id="formTitle">Đăng ký Sinh viên</h3>
                        </div>
                        <div class="card-body p-4">
                            <form id="studentForm" class="row g-3" novalidate>
    <input type="hidden" id="editId">
    
    <div class="col-md-6">
        <label class="form-label fw-semibold">Họ và tên</label>
        <input type="text" class="form-control" id="fullName" placeholder="Nguyễn Văn A">
        <div class="invalid-feedback">Họ tên không hợp lệ.</div>
    </div>
    <div class="col-md-6">
        <label class="form-label fw-semibold">Mã sinh viên</label>
        <input type="text" class="form-control" id="studentId" placeholder="SV001">
        <div class="invalid-feedback">Mã SV phải có dạng SV + số.</div>
    </div>
    <div class="col-md-6">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" class="form-control" id="email" placeholder="name@example.com">
        <div class="invalid-feedback">Email không đúng định dạng.</div>
    </div>
    <div class="col-md-6">
        <label class="form-label fw-semibold">Số điện thoại</label>
        <input type="tel" class="form-control" id="phone" placeholder="090...">
        <div class="invalid-feedback">SĐT phải có 10 số (đầu số VN).</div>
    </div>
    <div class="col-md-6">
        <label class="form-label fw-semibold">Ngành học</label>
        <select class="form-select" id="major">
            <option value="">-- Chọn ngành --</option>
            <option value="Công nghệ thông tin">Công nghệ thông tin</option>
            <option value="Quản trị kinh doanh">Quản trị kinh doanh</option>
            <option value="Thiết kế đồ họa">Thiết kế đồ họa</option>
        </select>
        <div class="invalid-feedback">Vui lòng chọn ngành học.</div>
    </div>
    <div class="col-md-6">
        <label class="form-label fw-semibold d-block">Giới tính</label>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" value="Nam" id="male" checked>
            <label class="form-check-label" for="male">Nam</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" value="Nữ" id="female">
            <label class="form-check-label" for="female">Nữ</label>
        </div>
    </div>
    <div class="col-12 mt-5 d-flex gap-2">
        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Lưu Thông Tin</button>
        <button type="button" class="btn btn-light w-100 py-2 fw-bold border" onclick="showList()">Hủy</button>
    </div>
</form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
